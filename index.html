<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <section class="hero">
      <form id="notionForm">
        <div class="input-group" id="input1">
          <label for="question 1">
            Se caso sua marca fosse um local físico (como um hotel, galeria de
            arte ou café), como seria?
          </label>
          <input type="text" id="name" required placeholder="Escreva aqui..." />
          <button type="button" class="next-question-button">
            Próxima Pergunta
          </button>
        </div>

        <div class="input-group" id="input2">
          <label for="question 2"
            >Como seria a iluminação? É um ambiente luminoso e clínico, ou
            escuro e melancólico?</label
          >
          <input type="text" required placeholder="Escreva aqui..." />
          <button type="button" class="next-question-button">
            Próxima Pergunta
          </button>
        </div>

        <div class="input-group" id="input3">
          <label for="question 3"
            >Se sua marca tivesse um cheiro, como seria? (Por exemplo: expresso,
            livros antigos, briza do oceano)</label
          >
          <input type="text" required placeholder="Escreva aqui..." />
          <button type="button" class="next-question-button">
            Enviar Respostas
          </button>
        </div>
      </form>
    </section>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollSmoother.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollToPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MorphSVGPlugin.min.js"></script>
    <script src=" https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js "></script>
    <script src="script.js"></script>
  </body>
</html>
